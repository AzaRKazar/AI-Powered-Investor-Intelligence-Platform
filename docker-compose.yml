services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override .env's localhost value - within the compose network the
      # Postgres container is reachable by its service name, not localhost.
      POSTGRES_HOST: postgres
      # .env may be set to "require" for testing against real Azure Postgres;
      # this local container has no SSL listener at all.
      POSTGRES_SSLMODE: disable
      # Ollama runs on the host machine, not in this compose network -
      # "localhost" inside the container means the container itself.
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
